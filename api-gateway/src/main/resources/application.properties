spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# SIMPLE ROUTING (No Filter yet)
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=student-service
spring.cloud.gateway.routes[1].uri=lb://STUDENT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/students/**
eureka.instance.prefer-ip-address=true
# Sampling probability: 1.0 means track 100% of requests (perfect for demos)
management.tracing.sampling.probability=1.0

# Expose Actuator endpoints so Zipkin can see them
management.endpoints.web.exposure.include=health,info,tracing

# The URL where Zipkin server will be running (Default is 9411)
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans