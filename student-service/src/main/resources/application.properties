spring.application.name=student-service
server.port=8082

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/student_db
spring.datasource.username=root
spring.datasource.password=madhubala$777
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
# Use JsonSerializer for better object handling in microservices
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# --- Tracing & Monitoring (Observability) ---
management.tracing.sampling.probability=1.0
# Added 'metrics' and 'health' for full visibility
management.endpoints.web.exposure.include=health,info,tracing,circuitbreakers,metrics
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# --- Circuit Breaker Config (Resilience4j) ---
# Name this instance same as what you use in @CircuitBreaker(name="studentService")
resilience4j.circuitbreaker.instances.studentService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.studentService.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.studentService.sliding-window-size=10
# Added: Minimum number of calls before the circuit breaker starts calculating
resilience4j.circuitbreaker.instances.studentService.minimum-number-of-calls=5
# Added: Allow the circuit breaker to automatically go from Open to Half-Open
resilience4j.circuitbreaker.instances.studentService.automatic-transition-from-open-to-half-open-enabled=true